<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I N  F I N I T E  By BlockEn542045/TheyHuman</title>
<style>
body, html {
  margin:0;
  padding:0;
  overflow:hidden;
  background:#000;
  font-family:monospace;
  user-select:none;
  touch-action:manipulation;
}

/* Initial (red) vignette background; JS will override when theme switches */
body {
  background:
    radial-gradient(circle at 20% 0%, rgba(255,40,40,0.25) 0, transparent 55%),
    radial-gradient(circle at 80% 100%, rgba(255,0,90,0.22) 0, transparent 60%),
    #000;
}

canvas {
  display:block;
  image-rendering:pixelated;
}

#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:#ff4444;
  font-size:20px;
  z-index:10;
  text-shadow:0 0 8px #ff2222,0 0 16px #ff4444;
}

#startScreen,#gameOverScreen {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:radial-gradient(circle at center, rgba(50,0,0,0.8) 0, rgba(0,0,0,0.95) 60%);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:#ff5555;
  font-size:28px;
  z-index:20;
  text-align:center;
  text-shadow:0 0 6px #ff2222,0 0 18px #aa0000;
}

button {
  margin-top:20px;
  padding:10px 26px;
  font-size:18px;
  color:#ff6666;
  background:linear-gradient(135deg, rgba(120,0,0,0.35), rgba(40,0,0,0.85));
  border:2px solid #ff4444;
  border-radius:6px;
  cursor:pointer;
  text-shadow:0 0 4px #ff0000;
  box-shadow:0 0 12px rgba(255,0,0,0.6);
  transition:background 0.15s ease, transform 0.1s ease, box-shadow 0.15s ease;
}

button:hover {
  background:linear-gradient(135deg, rgba(180,0,0,0.9), rgba(90,0,0,0.95));
  box-shadow:0 0 22px rgba(255,0,0,0.85);
  transform:translateY(-1px);
}
</style>
</head>
<body>
<div id="ui">Score: 0 | High Score: 0</div>
<div id="startScreen">
  <div style="font-size:48px;letter-spacing:8px;">I N  F I N I T E</div>
  <button id="startBtn">Start Game</button>
</div>
<!-- FIX: display:none (no %) so it actually hides -->
<div id="gameOverScreen" style="display:none;">
  <div style="font-size:48px;letter-spacing:6px;">Game Over</div>
  <div id="finalScore" style="margin-top:20px;"></div>
  <button id="restartBtn">Restart</button>
</div>
<canvas id="gameCanvas"></canvas>
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
let width=canvas.width=window.innerWidth;
let height=canvas.height=window.innerHeight;

// --- Constants ---
const gravity=0.7;
const jumpForce=15;
const playerSize=24;
const obstacleMinWidth=20;
const obstacleMaxWidth=35;

// --- Theme / difficulty state ---
let theme = 'red'; // 'red', 'blue', 'white'
let hardMode = false; // becomes true after black pad transition

// Apply theme to page/UI
function applyTheme(){
  const ui = document.getElementById('ui');
  if(theme === 'red'){
    document.body.style.background =
      'radial-gradient(circle at 20% 0%, rgba(255,40,40,0.25) 0, transparent 55%),' +
      'radial-gradient(circle at 80% 100%, rgba(255,0,90,0.22) 0, transparent 60%),' +
      '#000';
    ui.style.color = '#ff4444';
    ui.style.textShadow = '0 0 8px #ff2222,0 0 16px #ff4444';
  } else if(theme === 'blue'){
    document.body.style.background =
      'radial-gradient(circle at 20% 0%, rgba(40,150,255,0.27) 0, transparent 55%),' +
      'radial-gradient(circle at 80% 100%, rgba(0,120,255,0.25) 0, transparent 60%),' +
      '#000';
    ui.style.color = '#55bbff';
    ui.style.textShadow = '0 0 8px #33aaff,0 0 16px #88ddff';
  } else { // white hard area
    document.body.style.background =
      'radial-gradient(circle at 20% 0%, rgba(255,255,255,0.35) 0, transparent 55%),' +
      'radial-gradient(circle at 80% 100%, rgba(200,200,255,0.25) 0, transparent 60%),' +
      '#000';
    ui.style.color = '#ffffff';
    ui.style.textShadow = '0 0 10px #ffffff,0 0 22px #bbbbff';
  }
}

// --- Utilities ---
function randomRange(min,max){return Math.random()*(max-min)+min;}
function spawnParticles(x,y,color,count=10){for(let i=0;i<count;i++)particles.push(new Particle(x,y,color));}
function spawnDeathExplosion(x,y){
  for(let i=0;i<50;i++){
    deathParticles.push({
      x:x,
      y:y,
      dx:(Math.random()-0.5)*8,
      dy:(Math.random()-0.5)*8,
      size:2,
      alpha:1
    });
  }
}
function checkCollision(player,obj){
  const b=obj.getBounds();
  return (
    player.x< b.x+b.width &&
    player.x+player.width> b.x &&
    player.y< b.y+b.height &&
    player.y+player.height> b.y
  );
}

// --- Double jump charge state ---
let doubleJumpCharge = 1; // 0..1, 1 = ready

// --- Screen flash state ---
let screenFlash = { amount:0, r:0, g:0, b:0 };

// --- Crack fragments for ground-breaking effect ---
class CrackFragment {
  constructor(x,y){
    this.x = x;
    this.y = y;
    this.dx = randomRange(-3,3);
    this.dy = randomRange(-1,-4);
    this.size = randomRange(6,14);
    this.alpha = 1;
  }
  update(){
    this.x += this.dx;
    this.y += this.dy;
    this.dy += 0.2;
    this.alpha -= 0.03;
  }
  draw(){
    if(this.alpha<=0) return;
    ctx.globalAlpha = this.alpha;
    ctx.fillStyle = 'rgba(220,220,220,1)';
    ctx.fillRect(this.x, this.y, this.size, this.size/3);
    ctx.globalAlpha = 1;
  }
}

// --- Classes ---
class Player{
  constructor(){
    this.x=100;this.y=height-playerSize;this.width=playerSize;this.height=playerSize;
    this.dy=0;this.jumps=0;this.maxJumps=2;
    this.trail=[];
    this.angle=0;
    this.speedBoost=0;
  }
  update(){
    this.dy+=gravity;
    this.y+=this.dy;
    this.x+=this.speedBoost;
    this.speedBoost*=0.95;

    neonBlocks.forEach(b=>{
      const px=this.x, py=this.y, pw=this.width, ph=this.height;
      const bx=b.x, by=b.y, bw=b.width, bh=b.height;
      if(px+pw>bx && px<bx+bw &&
         py+ph<=by+this.dy && py+ph+this.dy>=by && this.dy>=0){
        this.y=by-ph; this.dy=0; this.jumps=0;
      }
    });

    if(this.y+this.height>height){
      this.y=height-this.height;
      this.dy=0;
      this.jumps=0;
      this.angle=0;
    } else {
      this.angle+=0.25;
    }

    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>10)this.trail.shift();

    if(this.jumps===0){
      doubleJumpCharge = Math.min(1, doubleJumpCharge + 0.008);
    } else {
      doubleJumpCharge = Math.min(1, doubleJumpCharge + 0.004);
    }
  }

  jump(force=jumpForce, fromPad=false){
    if(fromPad){
      this.dy=-force;
      this.jumps=1;
      spawnParticles(this.x+this.width/2,this.y+this.height,
        theme==='red' ? '#ff5555' :
        theme==='blue' ? '#66ccff' :
                         '#ffffff',18);
      return;
    }

    if(this.jumps===0){
      this.dy=-force;
      this.jumps=1;
      spawnParticles(this.x+this.width/2,this.y+this.height,
        theme==='red' ? '#ff5555' :
        theme==='blue' ? '#66ccff' :
                         '#ddddff',15);
    }
    else if(this.jumps===1 && doubleJumpCharge>=1){
      this.dy=-force*0.95;
      this.jumps=2;
      doubleJumpCharge=0;
      spawnParticles(this.x+this.width/2,this.y+this.height,
        theme==='red' ? '#ff7777' :
        theme==='blue' ? '#99ddff' :
                         '#ffffff',22);
    }
  }

  forwardBoost(amount){
    this.speedBoost=amount;
    spawnParticles(this.x+this.width/2,this.y+this.height/2,
      theme==='red' ? '#ff3333' :
      theme==='blue' ? '#55bbff' :
                       '#ffffff',12);
  }
  draw(){
    this.trail.forEach((t,i)=>{
      const alpha = i/this.trail.length/2;
      let col;
      if(theme==='red') col = `rgba(255,80,80,${alpha})`;
      else if(theme==='blue') col = `rgba(120,180,255,${alpha})`;
      else col = `rgba(255,255,255,${alpha})`;
      ctx.fillStyle = col;
      ctx.fillRect(Math.floor(t.x),Math.floor(t.y),this.width,this.height);
    });

    ctx.save();
    ctx.translate(this.x+this.width/2,this.y+this.height/2);
    ctx.rotate(this.angle);
    ctx.fillStyle='#000000';
    let strokeCol, shadowCol;
    if(theme==='red'){ strokeCol='#ff3333'; shadowCol='#ff2222'; }
    else if(theme==='blue'){ strokeCol='#33ccff'; shadowCol='#33aaff'; }
    else { strokeCol='#ffffff'; shadowCol='#f8f8ff'; }
    ctx.strokeStyle = strokeCol;
    ctx.lineWidth=3;
    ctx.shadowColor = shadowCol;
    ctx.shadowBlur=20;
    ctx.fillRect(-this.width/2,-this.height/2,this.width,this.height);
    ctx.strokeRect(-this.width/2,-this.height/2,this.width,this.height);
    ctx.shadowBlur=0;
    ctx.restore();
  }
}

class Spike{
  constructor(x,width,height,y=null){
    this.x=x;this.width=width;this.height=height;
    this.y=y===null?canvas.height-height:y;
  }
  update(speed){this.x-=speed;}
  draw(){
    let color;
    if(theme==='red') color='#ff0077';
    else if(theme==='blue') color='#55bbff';
    else color='#ffffff';
    ctx.fillStyle=color;
    ctx.shadowColor=color;
    ctx.shadowBlur=20;
    ctx.beginPath();
    ctx.moveTo(Math.floor(this.x),this.y+this.height);
    ctx.lineTo(Math.floor(this.x+this.width/2),this.y);
    ctx.lineTo(Math.floor(this.x+this.width),this.y+this.height);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur=0;
  }
  getBounds(){return {x:this.x,y:this.y,width:this.width,height:this.height};}
}

class SpikeCluster{
  constructor(x){
    this.spikes=[];
    const type=Math.random();
    const count=type<0.5?1:type<0.8?2:3;
    let spikeX=x;
    for(let i=0;i<count;i++){
      const w=randomRange(obstacleMinWidth,obstacleMaxWidth);
      const h=randomRange(30,80);
      this.spikes.push(new Spike(spikeX,w,h));
      spikeX+=w+5;
    }
  }
  update(speed){this.spikes.forEach(s=>s.update(speed));}
  draw(){this.spikes.forEach(s=>s.draw());}
}

class VerticalWall{
  constructor(x,width,height){
    this.x=x;this.width=width;this.height=height;
    this.baseY=randomRange(height/2,canvas.height-height/2);
    this.y=this.baseY;this.dir=1;this.speed=1;
  }
  update(speed){
    this.x-=speed;
    this.y+=this.dir*this.speed;
    if(this.y<50||this.y+this.height>canvas.height-50)this.dir*=-1;
  }
  draw(){
    let color;
    if(theme==='red') color='#ffdd33';
    else if(theme==='blue') color='#66ddff';
    else color='#ffffff';
    ctx.fillStyle=color;
    ctx.shadowColor=color;
    ctx.shadowBlur=18;
    ctx.fillRect(this.x,this.y,this.width,this.height);
    ctx.shadowBlur=0;
  }
  getBounds(){return {x:this.x,y:this.y,width:this.width,height:this.height};}
}

class FallingSpike{
  constructor(x,width,height){
    this.x=x;this.width=width;this.height=height;
    this.y=-height;this.fallSpeed=randomRange(2,5);
  }
  update(speed){
    this.x-=speed;
    this.y+=this.fallSpeed;
    if(this.y>canvas.height)this.y=-this.height;
  }
  draw(){
    let color;
    if(theme==='red') color='#ff0066';
    else if(theme==='blue') color='#66c0ff';
    else color='#ffffff';
    ctx.fillStyle=color;
    ctx.shadowColor=color;
    ctx.shadowBlur=20;
    ctx.beginPath();
    ctx.moveTo(Math.floor(this.x),this.y+this.height);
    ctx.lineTo(Math.floor(this.x+this.width/2),this.y);
    ctx.lineTo(Math.floor(this.x+this.width),this.y+this.height);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur=0;
  }
  getBounds(){return {x:this.x,y:this.y,width:this.width,height:this.height};}
}

class JumpPad {
  constructor(x,width,type='green'){
    this.x=x; this.width=width; this.height=10; this.y=height-this.height; this.type=type; this.cooldown=0;
    this.baseColor =
      type==='green' ? '#33ff55' :
      type==='red'   ? '#ff3333' :
      type==='blue'  ? '#00e5ff' :
      type==='purple'? '#ff00aa' :
      type==='slow'  ? '#9933ff' :
      type==='gray'  ? '#999999' :
      type==='white' ? '#ffffff' :
      type==='black' ? '#000000' :
                       '#ff4444';
  }
  update(speed){this.x-=speed;if(this.cooldown>0)this.cooldown--;}
  draw(){
    let color = this.baseColor;

    if(this.type==='white'){
      color = theme==='red' ? '#ffffff' :
              theme==='blue' ? '#99ddff' :
                               '#ffffff';
    }
    if(this.type==='gray'){
      color = theme==='red' ? '#888888' :
              theme==='blue' ? '#bbbbbb' :
                               '#cccccc';
    }

    if(this.type==='black'){
      ctx.fillStyle='#000000';
      ctx.shadowColor = theme==='blue' ? '#66e0ff' : '#ffffff';
      ctx.shadowBlur=22;
      ctx.fillRect(this.x,this.y,this.width,this.height);
      ctx.shadowBlur=0;
      ctx.strokeStyle = theme==='blue' ? '#66e0ff' : '#ffffff';
      ctx.lineWidth=2;
      ctx.strokeRect(this.x+1,this.y+1,this.width-2,this.height-2);
      return;
    }

    ctx.fillStyle=color;
    ctx.shadowColor=color;
    ctx.shadowBlur=18;
    ctx.fillRect(this.x,this.y,this.width,this.height);
    ctx.shadowBlur=0;
  }
  getBounds(){return {x:this.x,y:this.y,width:this.width,height:this.height};}
}

class NeonBlock{
  constructor(x,width,height,y){
    this.x=x;this.width=width;this.height=height;this.y=y;
  }
  update(speed){this.x-=speed;}
  draw(){
    let color;
    if(theme==='red') color='#ff8800';
    else if(theme==='blue') color='#3399ff';
    else color='#ffffff';
    ctx.fillStyle=color;
    ctx.shadowColor=color;
    ctx.shadowBlur=15;
    ctx.fillRect(this.x,this.y,this.width,this.height);
    ctx.shadowBlur=0;
  }
  getBounds(){return {x:this.x,y:this.y,width:this.width,height:this.height};}
}

class Particle{
  constructor(x,y,color){
    this.x=x;this.y=y;this.color=color;
    this.dx=randomRange(-4,4);
    this.dy=randomRange(-4,-1);
    this.alpha=1;
  }
  update(){
    this.x+=this.dx;
    this.y+=this.dy;
    this.alpha-=0.03;
  }
  draw(){
    ctx.globalAlpha=this.alpha;
    ctx.fillStyle=this.color;
    ctx.fillRect(Math.floor(this.x),Math.floor(this.y),2,2);
    ctx.globalAlpha=1;
  }
}

class CircleBG{
  constructor(){
    this.x=randomRange(0,width);
    this.y=randomRange(0,height);
    this.radius=randomRange(2,8);
    this.speed=randomRange(0.1,0.8);

    const rR=200+Math.floor(randomRange(0,55));
    const gR=Math.floor(randomRange(0,60));
    const bR=Math.floor(randomRange(0,60));
    this.colorRed=`rgba(${rR},${gR},${bR},0.25)`;

    const rB=Math.floor(randomRange(0,60));
    const gB=Math.floor(randomRange(80,150));
    const bB=200+Math.floor(randomRange(0,55));
    this.colorBlue=`rgba(${rB},${gB},${bB},0.25)`;

    const rW=220+Math.floor(randomRange(0,35));
    const gW=220+Math.floor(randomRange(0,35));
    const bW=220+Math.floor(randomRange(0,35));
    this.colorWhite=`rgba(${rW},${gW},${bW},0.25)`;
  }
  update(){
    this.x-=this.speed;
    if(this.x<-this.radius){
      this.x=width+this.radius;
      this.y=randomRange(0,height);
    }
  }
  draw(){
    let col = this.colorRed;
    if(theme==='blue') col=this.colorBlue;
    else if(theme==='white') col=this.colorWhite;
    ctx.fillStyle = col;
    ctx.fillRect(Math.floor(this.x),Math.floor(this.y),this.radius,this.radius);
  }
}

class BlueJumpParticle {
  constructor(x, y){
    this.x = x;
    this.y = y;
    this.angle = randomRange(-Math.PI * 0.9, -Math.PI * 0.1);
    this.speed = randomRange(3, 6);
    this.dx = Math.cos(this.angle) * this.speed;
    this.dy = Math.sin(this.angle) * this.speed;
    this.size = randomRange(3, 6);
    this.alpha = 1;
    this.thickness = randomRange(2, 4);
  }
  update(){
    this.x += this.dx;
    this.y += this.dy;
    this.alpha -= 0.04;
    this.size *= 0.95;
  }
  draw(){
    if(this.alpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = this.alpha;
    let col;
    if(theme==='red') col = `rgba(255,180,0,${this.alpha})`;
    else if(theme==='blue') col = `rgba(160,220,255,${this.alpha})`;
    else col = `rgba(255,255,255,${this.alpha})`;
    ctx.strokeStyle = col;
    ctx.lineWidth = this.thickness;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(this.x - this.dx * 0.3, this.y - this.dy * 0.3);
    ctx.stroke();
    ctx.restore();
  }
}

class DashTrail {
  constructor(x, y){
    this.x = x;
    this.y = y;
    this.dx = randomRange(-2, -6);
    this.dy = randomRange(-1.5, 1.5);
    this.alpha = 1;
    this.size = randomRange(4,7);
  }
  update(){
    this.x += this.dx;
    this.y += this.dy;
    this.alpha -= 0.05;
  }
  draw(){
    ctx.globalAlpha = this.alpha;
    let col;
    if(theme==='red') col='#ff3333';
    else if(theme==='blue') col='#66c0ff';
    else col='#ffffff';
    ctx.fillStyle = col;
    ctx.fillRect(this.x, this.y, this.size, this.size);
    ctx.globalAlpha = 1;
  }
}

class SlowPixel {
  constructor(x,y){
    this.x=x;
    this.y=y;
    this.dx=randomRange(-6,6);
    this.dy=randomRange(-6,6);
    this.size=randomRange(2,4);
    this.alpha=1;
  }
  update(){
    this.x+=this.dx;
    this.y+=this.dy;
    this.alpha-=0.04;
  }
  draw(){
    ctx.globalAlpha=this.alpha;
    let col;
    if(theme==='red') col='#aa0000';
    else if(theme==='blue') col='#1177dd';
    else col='#ffffff';
    ctx.fillStyle= col;
    ctx.fillRect(this.x,this.y,this.size,this.size);
    ctx.globalAlpha=1;
  }
}

class GroundSpike {
  constructor(x,width,maxHeight){
    this.x=x;
    this.width=width;
    this.maxHeight=maxHeight;
    this.height=0;
    this.y=height;
  }
  update(speed){
    this.x -= speed;
    if(this.height < this.maxHeight){
      this.height += 4;
      this.y = height - this.height;
    }
  }
  draw(){
    const active = (theme==='blue' || theme==='white');
    let color = active ? (theme==='white' ? '#ffffff' : '#66ccff') : '#331111';
    ctx.fillStyle=color;
    ctx.shadowColor=color;
    ctx.shadowBlur= active ? 18 : 0;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y+this.height);
    ctx.lineTo(this.x+this.width/2, this.y);
    ctx.lineTo(this.x+this.width, this.y+this.height);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur=0;
  }
  getBounds(){return {x:this.x,y:this.y,width:this.width,height:this.height};}
}

// --- Global state ---
let player=new Player(),
    obstacles=[],
    jumpPads=[],
    neonBlocks=[],
    fallingSpikes=[],
    walls=[],
    groundSpikes=[],
    bgCircles=Array.from({length:120},()=>new CircleBG()),
    particles=[],
    deathParticles=[],
    slowPixels=[],
    crackFragments=[];
let speed=10, score=0,                 // FIX: slightly slower start speed
    highScore=localStorage.getItem('INFINITE_HIGH')||0,
    gameOver=false;
let obstacleTimer=0, padTimer=0, wallTimer=0, fallTimer=0, blockTimer=0;
let obstacleInterval=60, padInterval=250, wallInterval=400, fallInterval=300, blockInterval=300;
let slowTimer=0, slowActive=false, normalSpeed=speed;
let slowRipple = null;
let slowVignettePulse = 0;
let dashTrails = [];
let blueJumpParticles = [];

// --- Spawn Functions ---
function spawnObstacle(){obstacles.push(new SpikeCluster(width+randomRange(50,100)));}

// Pad spawn with higher white/black chance (unchanged logic)
function spawnPad(){
  let r=Math.random(), type='green';

  if(r<0.06)                          type='blue';
  else if(r<0.12)                     type='red';
  else if(r<0.18)                     type='purple';
  else if(r<0.26)                     type='slow';
  else if(r<0.33)                     type='gray';
  else if(r<0.50)                     type='white';
  else if(r<0.65 && theme==='blue')   type='black';

  jumpPads.push(new JumpPad(width+randomRange(80,140),randomRange(40,80),type));
}

function spawnWall(){walls.push(new VerticalWall(width+randomRange(50,100),randomRange(20,50),randomRange(80,150)));}
function spawnFallingSpike(){fallingSpikes.push(new FallingSpike(width+randomRange(50,100),randomRange(20,30),randomRange(30,50)));}
function spawnNeonBlock(){
  let w=randomRange(60,120),h=20;
  let y=(Math.random()<0.6)?randomRange(height-200,height-60):randomRange(height-350,height-250);
  neonBlocks.push(new NeonBlock(width,w,h,y));
}

function spawnGroundSpikesAtPad(pad){
  const count = 3 + Math.floor(Math.random()*2);
  const segW = pad.width / count;
  for(let i=0;i<count;i++){
    groundSpikes.push(new GroundSpike(pad.x + i*segW, segW, randomRange(40,80)));
  }
  for(let i=0;i<18;i++){
    slowPixels.push(new SlowPixel(
      pad.x + pad.width*Math.random(),
      height - 5 + randomRange(-10,10)
    ));
  }
}

// --- Game Over ---
function triggerGameOver(){
  if(gameOver) return; // prevent double-trigger
  gameOver=true;
  spawnDeathExplosion(player.x+player.width/2,player.y+player.height/2);
  document.getElementById('finalScore').innerText=`Score: ${Math.floor(score)}`;
  if(score>highScore){
    highScore=Math.floor(score);
    localStorage.setItem('INFINITE_HIGH',highScore);
  }
  document.getElementById('gameOverScreen').style.display='flex';
}

// --- Update ---
function update(){
  player.update();
  obstacles.forEach(c=>c.update(speed)); obstacles=obstacles.filter(c=>c.spikes.some(s=>s.x+s.width>0));
  walls.forEach(w=>w.update(speed)); walls=walls.filter(w=>w.x+w.width>0);
  fallingSpikes.forEach(f=>f.update(speed)); fallingSpikes=fallingSpikes.filter(f=>f.x+f.width>0);
  neonBlocks.forEach(b=>b.update(speed)); neonBlocks=neonBlocks.filter(b=>b.x+b.width>0);
  jumpPads.forEach(p=>p.update(speed)); jumpPads=jumpPads.filter(p=>p.x+p.width>0);
  groundSpikes.forEach(g=>g.update(speed)); groundSpikes = groundSpikes.filter(g=>g.x+g.width>0);

  particles.forEach(p=>p.update()); particles=particles.filter(p=>p.alpha>0);
  deathParticles.forEach(p=>{p.x+=p.dx;p.y+=p.dy;p.alpha-=0.05;}); deathParticles=deathParticles.filter(p=>p.alpha>0);
  bgCircles.forEach(c=>c.update());

  crackFragments.forEach(c=>c.update());
  crackFragments = crackFragments.filter(c=>c.alpha>0);

  dashTrails.forEach(t => t.update());
  dashTrails = dashTrails.filter(t => t.alpha > 0);

  if(screenFlash.amount > 0){
    screenFlash.amount -= 0.05;
    if(screenFlash.amount < 0) screenFlash.amount = 0;
  }

  obstacleTimer++; padTimer++; wallTimer++; fallTimer++; blockTimer++;
  if(obstacleTimer>obstacleInterval){spawnObstacle(); obstacleTimer=0;}
  if(padTimer>padInterval){spawnPad(); padTimer=0;}
  if(wallTimer>wallInterval){spawnWall(); wallTimer=0;}
  if(fallTimer>fallInterval){spawnFallingSpike(); fallTimer=0;}
  if(blockTimer>blockInterval){spawnNeonBlock(); blockTimer=0;}

  slowPixels.forEach(p=>p.update());
  slowPixels = slowPixels.filter(p=>p.alpha > 0);

  blueJumpParticles.forEach(p => p.update());
  blueJumpParticles = blueJumpParticles.filter(
    p => p.alpha > 0 && p.size > 0.5
  );

  if(slowActive){
    slowTimer--;
    if(slowTimer<=0){
      speed=normalSpeed;
      slowActive=false;
    }
  }

  if(slowRipple){
    slowRipple.r1 += 8;
    slowRipple.a1 -= 0.03;
    slowRipple.r2 += 5;
    slowRipple.a2 -= 0.02;
    if(slowRipple.a1 <= 0 && slowRipple.a2 <= 0){
      slowRipple = null;
    }
  }

  if (slowVignettePulse > 0.01) {
    slowVignettePulse *= 0.9;
  }

  jumpPads.forEach(p=>{
    if(p.cooldown===0 && checkCollision(player,p)){

      if(p.type==='green') {
        player.jump(25,true);
      }
      else if(p.type==='red'){
        player.forwardBoost(12);

        for(let i=0;i<18;i++){
          dashTrails.push(new DashTrail(
            player.x,
            player.y + player.height/2
          ));
        }

        spawnParticles(
          player.x + player.width/2,
          player.y + player.height/2,
          theme==='red' ? '#ff2222' :
          theme==='blue' ? '#66bbff' :
                           '#ffffff',
          20
        );
      }
      else if(p.type==='blue'){
        player.jump(42,true);

        for(let i=0; i<30; i++){
          blueJumpParticles.push(new BlueJumpParticle(
            player.x + player.width / 2,
            player.y + player.height / 2
          ));
        }

        screenFlash = { amount:0.7, r:80, g:180, b:255 };
      }
      else if(p.type==='purple'){
        speed *= -1;
        setTimeout(()=>speed*=-1,800);
      }
      else if(p.type==='slow' && !slowActive){
        normalSpeed = speed;
        speed *= 0.5;
        slowTimer = 90;
        slowActive = true;

        slowRipple = {
          x: player.x + player.width/2,
          y: player.y + player.height/2,
          r1: 0,
          a1: 0.6,
          r2: 0,
          a2: 0.35
        };

        for(let i=0;i<30;i++){
          slowPixels.push(new SlowPixel(
            player.x + player.width/2,
            player.y + player.height/2
          ));
        }
      }
      else if(p.type==='gray'){
        if(theme==='blue' || theme==='white'){
          spawnGroundSpikesAtPad(p);
        }
      }
      else if(p.type==='white'){
        theme = (theme==='red') ? 'blue' : 'red';
        hardMode = false;
        applyTheme();

        screenFlash = { amount:1.0, r:255, g:255, b:255 };

        if(theme==='red'){
          groundSpikes = [];
        }
      }
      else if(p.type==='black'){
        if(theme==='blue' && !hardMode){
          const floorHeight=110;
          const floorY = height-floorHeight;
          for(let x = -40; x < width+40; x+=25){
            crackFragments.push(new CrackFragment(x + randomRange(-10,10), floorY + randomRange(-5,10)));
          }
          for(let i=0;i<40;i++){
            slowPixels.push(new SlowPixel(
              randomRange(0,width),
              floorY + randomRange(-10,20)
            ));
          }

          screenFlash = { amount:1.0, r:255, g:255, b:255 };

          hardMode = true;
          theme = 'white';
          applyTheme();

          speed += 4;
          obstacleInterval = 50;
          wallInterval = 320;
          fallInterval = 260;
          blockInterval = 260;
        }
      }

      p.cooldown = 25;
    }
  });

  obstacles.forEach(c=>c.spikes.forEach(s=>{if(checkCollision(player,s)) triggerGameOver();}));
  walls.forEach(w=>{if(checkCollision(player,w)) triggerGameOver();});
  fallingSpikes.forEach(f=>{if(checkCollision(player,f)) triggerGameOver();});
  groundSpikes.forEach(g=>{if((theme==='blue' || theme==='white') && checkCollision(player,g)) triggerGameOver();});

  if(!gameOver){
    score+=0.25;
    // FIX: cap and slow down global speed growth to avoid crazy speeds/lag
    if(speed < 18){
      speed+=0.002;
    }
    document.getElementById('ui').innerText=`Score: ${Math.floor(score)} | High Score: ${highScore}`;
  }
}

// --- Draw ---
function draw(){
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,width,height);

  bgCircles.forEach(c=>c.draw());

  obstacles.forEach(c=>c.draw());
  walls.forEach(w=>w.draw());
  fallingSpikes.forEach(f=>f.draw());
  neonBlocks.forEach(b=>b.draw());
  groundSpikes.forEach(g=>g.draw());
  jumpPads.forEach(p=>p.draw());

  const floorHeight=110;
  const floorY = height-floorHeight;

  const floorGradient=ctx.createLinearGradient(0,floorY,width,height);
  if(theme==='red'){
    floorGradient.addColorStop(0,'rgba(255,60,60,0.22)');
    floorGradient.addColorStop(0.5,'rgba(255,40,40,0.12)');
    floorGradient.addColorStop(1,'rgba(255,20,20,0)');
  } else if(theme==='blue'){
    floorGradient.addColorStop(0,'rgba(80,160,255,0.22)');
    floorGradient.addColorStop(0.5,'rgba(60,140,255,0.12)');
    floorGradient.addColorStop(1,'rgba(40,120,255,0)');
  } else {
    floorGradient.addColorStop(0,'rgba(255,255,255,0.32)');
    floorGradient.addColorStop(0.5,'rgba(220,220,255,0.18)');
    floorGradient.addColorStop(1,'rgba(200,200,255,0)');
  }
  ctx.fillStyle=floorGradient;
  ctx.fillRect(0,floorY,width,floorHeight);

  ctx.save();
  if(theme==='red') ctx.strokeStyle = 'rgba(255,60,60,0.4)';
  else if(theme==='blue') ctx.strokeStyle = 'rgba(120,190,255,0.45)';
  else ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth=1;

  for(let x=-80;x<width+80;x+=40){
    ctx.beginPath();
    ctx.moveTo(x, floorY);
    ctx.lineTo(x + 80, height);
    ctx.stroke();
  }

  if(theme==='red')
    ctx.strokeStyle = 'rgba(255,120,120,0.25)';
  else if(theme==='blue')
    ctx.strokeStyle = 'rgba(150,210,255,0.25)';
  else
    ctx.strokeStyle = 'rgba(255,255,255,0.28)';

  for(let y=0;y<=floorHeight;y+=18){
    ctx.beginPath();
    ctx.moveTo(0, height - y);
    ctx.lineTo(width, height - y - 40);
    ctx.stroke();
  }
  ctx.restore();

  crackFragments.forEach(c=>c.draw());

  dashTrails.forEach(t => t.draw());
  blueJumpParticles.forEach(p=>p.draw());

  player.draw();
  particles.forEach(p=>p.draw());
  slowPixels.forEach(p=>p.draw());

  const barWidth = 48;
  const barHeight = 6;
  let barX = player.x + player.width/2 - barWidth/2;
  let barY = player.y - 18;

  if(barX < 8) barX = 8;
  if(barX + barWidth > width-8) barX = width - 8 - barWidth;
  if(barY < 8) barY = 8;

  ctx.save();
  ctx.fillStyle =
    theme==='red' ? 'rgba(40,0,0,0.8)' :
    theme==='blue' ? 'rgba(0,10,40,0.8)' :
                     'rgba(40,40,40,0.8)';
  ctx.fillRect(barX, barY, barWidth, barHeight);

  const filled = (barWidth-2) * doubleJumpCharge;
  ctx.fillStyle =
    theme==='red' ? 'rgba(255,40,40,0.95)' :
    theme==='blue' ? 'rgba(80,180,255,0.95)' :
                     'rgba(255,255,255,0.95)';
  ctx.shadowColor =
    theme==='red' ? '#ff3333' :
    theme==='blue' ? '#66ccff' :
                     '#ffffff';
  ctx.shadowBlur = 12 * (0.4 + 0.6*doubleJumpCharge);
  ctx.fillRect(barX+1, barY+1, filled, barHeight-2);

  ctx.shadowBlur = 0;
  ctx.strokeStyle =
    theme==='red' ? 'rgba(255,100,100,0.85)' :
    theme==='blue' ? 'rgba(150,210,255,0.85)' :
                     'rgba(255,255,255,0.9)';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX+0.5, barY+0.5, barWidth-1, barHeight-1);
  ctx.restore();

  deathParticles.forEach(p=>{
    let col;
    if(theme==='red') col = `rgba(255,80,80,${p.alpha})`;
    else if(theme==='blue') col = `rgba(120,200,255,${p.alpha})`;
    else col = `rgba(255,255,255,${p.alpha})`;
    ctx.fillStyle=col;
    ctx.fillRect(p.x,p.y,p.size,p.size);
  });

  const g1=ctx.createLinearGradient(0,0,150,0);
  g1.addColorStop(0,'#000');
  g1.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g1;
  ctx.fillRect(0,0,150,height);

  const g2=ctx.createLinearGradient(width-150,0,width,0);
  g2.addColorStop(0,'rgba(0,0,0,0)');
  g2.addColorStop(1,'#000');
  ctx.fillStyle=g2;
  ctx.fillRect(width-150,0,150,height);

  if(slowRipple){
    ctx.beginPath();
    ctx.arc(slowRipple.x, slowRipple.y, slowRipple.r1, 0, Math.PI * 2);
    let ring1Col = theme==='red'
      ? `rgba(255,80,80,${slowRipple.a1})`
      : theme==='blue'
      ? `rgba(80,180,255,${slowRipple.a1})`
      : `rgba(255,255,255,${slowRipple.a1})`;
    ctx.strokeStyle = ring1Col;
    ctx.lineWidth = 6;
    ctx.shadowColor = theme==='red' ? '#ff4444' :
                      theme==='blue' ? '#66bbff' :
                                       '#ffffff';
    ctx.shadowBlur = 20;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(slowRipple.x, slowRipple.y, slowRipple.r2, 0, Math.PI * 2);
    let ring2Col = theme==='red'
      ? `rgba(180,0,0,${slowRipple.a2})`
      : theme==='blue'
      ? `rgba(30,80,160,${slowRipple.a2})`
      : `rgba(180,180,255,${slowRipple.a2})`;
    ctx.strokeStyle = ring2Col;
    ctx.lineWidth = 3;
    ctx.shadowColor = theme==='red' ? '#aa0000' :
                      theme==='blue' ? '#2277dd' :
                                       '#bbbbff';
    ctx.shadowBlur = 12;
    ctx.stroke();

    ctx.shadowBlur = 0;
  }

  if (slowVignettePulse > 0.01) {
    const intensity = 0.25 + Math.sin(slowVignettePulse) * 0.15;

    const vignette = ctx.createRadialGradient(
      width / 2, height / 2, width * 0.3,
      width / 2, height / 2, width * 0.7
    );

    let col = theme==='red'
      ? `rgba(60,0,0,${intensity})`
      : theme==='blue'
      ? `rgba(0,20,80,${intensity})`
      : `rgba(255,255,255,${intensity*0.65})`;

    vignette.addColorStop(0, 'rgba(0,0,0,0)');
    vignette.addColorStop(1, col);

    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, width, height);
  }

  if(screenFlash.amount > 0){
    ctx.fillStyle = `rgba(${screenFlash.r},${screenFlash.g},${screenFlash.b},${screenFlash.amount})`;
    ctx.fillRect(0,0,width,height);
  }
}

// --- Loop ---
function gameLoop(){
  if(!gameOver){
    update();
    draw();
    requestAnimationFrame(gameLoop);
  }
}

// --- Input ---
document.addEventListener('keydown',e=>{
  if(e.code==='Space')player.jump();
});
canvas.addEventListener('click',()=>player.jump());
canvas.addEventListener('touchstart',e=>{player.jump();e.preventDefault();});

// --- Start/Restart ---
document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('startScreen').style.display='none';
  resetGame();
  gameLoop();
});
document.getElementById('restartBtn').addEventListener('click',()=>{
  document.getElementById('gameOverScreen').style.display='none';
  resetGame();
  gameLoop();
});

function resetGame(){
  player=new Player();
  obstacles=[]; walls=[]; fallingSpikes=[]; neonBlocks=[]; jumpPads=[];
  groundSpikes=[];
  particles=[]; deathParticles=[];
  slowPixels = [];
  crackFragments = [];
  obstacleTimer=0; padTimer=0; wallTimer=0; fallTimer=0; blockTimer=0;
  obstacleInterval=60; padInterval=250; wallInterval=400; fallInterval=300; blockInterval=300;
  score=0;
  speed=10;                          // FIX: reset to same sane speed
  gameOver=false;
  slowRipple = null;
  slowActive = false;
  dashTrails = [];
  blueJumpParticles = [];
  screenFlash = { amount:0, r:0, g:0, b:0 };
  doubleJumpCharge = 1;
  theme = 'red';
  hardMode = false;
  applyTheme();
  spawnNeonBlock(); spawnPad(); spawnObstacle();
}

window.addEventListener('resize',()=>{
  width=canvas.width=window.innerWidth;
  height=canvas.height=window.innerHeight;
});
applyTheme();
</script>
</body>
